<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warung Digital - Live Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="app-shell">
    <nav class="nav-tabs" aria-label="Navigasi dashboard">
      <button class="tab-btn active" data-tab-target="input">Input (Admin)</button>
      <button class="tab-btn" data-tab-target="dapur">Dapur (Live)</button>
      <button class="tab-btn" data-tab-target="history">Riwayat</button>
    </nav>

    <section id="input" class="section active" aria-labelledby="form-title">
      <div class="panel">
        <h2 id="form-title">Input Pesanan Baru</h2>

        <label for="m-menu">Menu</label>
        <select id="m-menu" class="field-control">
          <option value="Nasi Goreng">Nasi Goreng</option>
          <option value="Mie Goreng">Mie Goreng</option>
          <option value="Mawut">Mawut</option>
        </select>

        <label for="m-rasa">Tingkat Pedas</label>
        <select id="m-rasa" class="field-control">
          <option value="BIASA">BIASA (Tidak Pedas)</option>
          <option value="PEDAS">PEDAS</option>
        </select>

        <label for="m-qty">Jumlah Porsi</label>
        <input
          type="number"
          id="m-qty"
          min="1"
          class="field-control"
          placeholder="Contoh: 8"
        >

        <button id="btn-kirim" class="btn-primary">Kirim ke Dapur</button>
      </div>
    </section>

    <section id="dapur" class="section" aria-labelledby="dapur-title">
      <h2 id="dapur-title" class="section-title">
        <i class="fas fa-fire" aria-hidden="true"></i>
        Antrian Masak
      </h2>
      <div id="list-antrian"></div>
    </section>

    <section id="history" class="section" aria-labelledby="riwayat-title">
      <h2 id="riwayat-title" class="section-title">Riwayat Masak</h2>
      <div id="list-riwayat"></div>
    </section>
  </main>

  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
