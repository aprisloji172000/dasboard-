<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warung Digital - Pesan Online</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-content">
        <a
          href="https://aprisloji172000.github.io/dasboard-/"
          class="back-link"
          aria-label="Kembali ke halaman utama"
        >
          <i class="fas fa-arrow-left"></i>
        </a>

        <h1 class="brand-title"><i class="fas fa-utensils"></i> Warung Digital</h1>

        <button class="cart-icon" id="cartButton" type="button" aria-label="Buka keranjang">
          <i class="fas fa-shopping-basket"></i>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </header>

    <main class="container">
      <section class="promo-banner">
        <i class="fas fa-motorcycle promo-icon"></i>
        <div>
          <h2 class="promo-title">Promo COD Gratis!</h2>
          <p class="promo-desc">
            Belanja minimal <b>Rp 50.000</b> dan nikmati pengantaran GRATIS.
          </p>
        </div>
      </section>

      <section class="menu-grid" id="menuGrid" aria-label="Daftar menu"></section>

      <section class="delivery-note" aria-label="Catatan area pengantaran">
        <p>
          <i class="fas fa-exclamation-triangle"></i> PERHATIAN:<br />
          PESANAN COD HANYA DIANTAR UNTUK WILAYAH DESA SENDURO
        </p>
      </section>
    </main>

    <div class="overlay" id="overlay"></div>

    <aside class="cart-sidebar" id="cartSidebar" aria-label="Keranjang belanja">
      <div class="cart-header">
        <h3>Keranjang Saya</h3>
        <button class="icon-button" id="closeCartButton" type="button" aria-label="Tutup keranjang">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="cart-items" id="cartItems"></div>

      <div id="shippingStatus"></div>

      <div class="cart-footer">
        <div class="cart-total-row">
          <span>Total Belanja:</span>
          <span id="cartTotal" class="cart-total-value">Rp 0</span>
        </div>
        <button class="btn-wa" id="checkoutButton" type="button">Pesan via WhatsApp</button>
      </div>
    </aside>

    <div class="modal" id="checkoutModal" aria-hidden="true">
      <div class="modal-content">
        <h3 class="modal-title">Data Pengiriman</h3>
        <div class="form-group">
          <label for="custName">Nama Lengkap</label>
          <input type="text" id="custName" placeholder="Masukkan nama Anda" />
        </div>
        <div class="form-group">
          <label for="custAddr">Alamat Lengkap / No. Meja</label>
          <textarea id="custAddr" placeholder="Tulis alamat pengantaran" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="custLoc">Link Lokasi Google Maps</label>
          <button type="button" class="btn-location" id="locationButton">
            <i class="fas fa-map-marker-alt"></i> Ambil Lokasi Otomatis
          </button>
          <input type="text" id="custLoc" placeholder="Link lokasi akan muncul di sini" />
          <small class="helper-text"
            >Atau buka Maps &gt; Pilih Lokasi &gt; Share &gt; Salin Link</small
          >
        </div>
        <button class="btn-wa" id="sendWaButton" type="button">
          <i class="fab fa-whatsapp"></i> Konfirmasi &amp; Kirim WA
        </button>
        <button id="cancelCheckoutButton" type="button" class="cancel-button">Batal</button>
      </div>
    </div>

    <script src="assets/js/app.js"></script>
  </body>
</html>
