<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Cak Kapit</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo-circle">
        <img
          src="https://uploads.onecompiler.io/44cgbcu3p/44f268w78/logo2.png"
          alt="Logo Cak Kapit"
          class="logo-image"
        />
      </div>
      <p>Selamat Datang di</p>
      <h1>NASI &amp; MIE GORENG CAK KAPIT</h1>
    </header>

    <main class="container">
      <section class="card">
        <div id="status-label" class="status-badge">Memuat...</div>
        <div class="time-live" id="clock">00:00:00</div>
        <p class="open-hours">
          <i class="far fa-calendar-alt"></i> Jam Buka: 17:00 - 00:00 WIB
        </p>

        <div class="admin-panel">
          <p class="admin-title">
            <i class="fas fa-lock"></i> KONTROL OWNER (PERLU AKSES)
          </p>
          <button class="btn-toggle btn-habis" onclick="setStatusWithAuth('habis')">
            SET HABIS / TUTUP
          </button>
          <button class="btn-toggle btn-auto" onclick="setStatusWithAuth('auto')">
            MODE OTOMATIS
          </button>
        </div>
      </section>

      <section class="grid-menu">
        <a href="https://aprisloji172000.github.io/conto-pesan/" class="btn-main">
          <i class="fas fa-utensils"></i>
          Lihat Menu
        </a>

        <a
          href="https://maps.app.goo.gl/1o8tspGSXFZTzgms9?g_st=awb"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-main"
        >
          <i class="fas fa-map-marked-alt"></i>
          Lokasi Warung
        </a>

        <a
          href="https://s.id/GaleriCakKapit"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-main"
        >
          <i class="fas fa-images"></i>
          Foto &amp; Galeri
        </a>

        <button type="button" class="btn-main" onclick="aksesDapur()">
          <i class="fas fa-fire-alt"></i>
          Dapur Live
        </button>
      </section>
    </main>

    <script src="assets/js/app.js"></script>
  </body>
</html>
