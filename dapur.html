<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warung Digital - Live Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --pedas: #ff1744; --biasa: #00e676; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #ddd; }
        .tab-btn.active { background: #333; color: white; }
        
        .section { display: none; }
        .section.active { display: block; }

        /* Card Style */
        .order-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 10px solid; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .PEDAS { border-left-color: var(--pedas); }
        .BIASA { border-left-color: var(--biasa); }
        
        .btn-done { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .riwayat-item { background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="openTab('input')">INPUT (Admin)</button>
        <button class="tab-btn" onclick="openTab('dapur')">DAPUR (Live)</button>
        <button class="tab-btn" onclick="openTab('history')">RIWAYAT</button>
    </div>

    <div id="input" class="section active">
        <div style="background:white; padding:20px; border-radius:12px;">
            <h3>Input Pesanan Baru</h3>
            <select id="m-menu" style="width:100%; padding:10px; margin-bottom:10px;">
                <option value="Nasi Goreng">Nasi Goreng</option>
                <option value="Mie Goreng">Mie Goreng</option>
                <option value="Mawut">Mawut</option>
            </select>
            <select id="m-rasa" style="width:100%; padding:10px; margin-bottom:10px;">
                <option value="BIASA">BIASA (Tidak Pedas)</option>
                <option value="PEDAS">PEDAS</option>
            </select>
            <input type="number" id="m-qty" placeholder="Jumlah Porsi" style="width:100%; padding:10px; margin-bottom:10px;">
            <button onclick="kirimKeDapur()" style="width:100%; padding:15px; background:#ff6b35; color:white; border:none; border-radius:8px; font-weight:bold;">KIRIM KE DAPUR</button>
        </div>
    </div>

    <div id="dapur" class="section">
        <h2 style="text-align:center;"><i class="fas fa-fire"></i> ANTRIAN MASAK</h2>
        <div id="list-antrian"></div>
    </div>

    <div id="history" class="section">
        <h2>Riwayat Masak</h2>
        <div id="list-riwayat"></div>
    </div>

<script>
    // --- LINK FIREBASE KAMU ---
    const firebaseConfig = {
        databaseURL: "https://warungdigital-97318-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function kirimKeDapur() {
        const menu = document.getElementById('m-menu').value;
        const rasa = document.getElementById('m-rasa').value;
        const qty = parseInt(document.getElementById('m-qty').value);
        
        if(!qty) return alert("Isi jumlah!");

        let sisa = qty;
        while(sisa > 0) {
            let porsi = sisa > 5 ? 5 : sisa;
            db.ref('antrian').push({
                menu: menu,
                rasa: rasa,
                porsi: porsi,
                timestamp: Date.now(),
                status: 'pending'
            });
            sisa -= 5;
        }
        alert("Pesanan masuk ke dapur!");
        document.getElementById('m-qty').value = "";
    }

    db.ref('antrian').on('value', (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById('list-antrian');
        container.innerHTML = "";
        
        if(data) {
            Object.keys(data).forEach(key => {
                const item = data[key];
                container.innerHTML += `
                    <div class="order-card ${item.rasa}">
                        <b>${item.menu.toUpperCase()}</b> - <span style="color:${item.rasa === 'PEDAS' ? 'red' : 'green'}">${item.rasa}</span><br>
                        <h1 style="margin:5px 0;">MASAK: ${item.porsi} PORSI</h1>
                        <button class="btn-done" onclick="selesaiMasak('${key}')">SELESAI / ANGKAT</button>
                    </div>
                `;
            });
        }
    });

    function selesaiMasak(id) {
        db.ref('antrian/' + id).once('value', (snap) => {
            const data = snap.val();
            db.ref('history').push({
                ...data,
                doneAt: new Date().toLocaleString()
            });
            db.ref('antrian/' + id).remove();
        });
    }

    db.ref('history').limitToLast(30).on('value', (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById('list-riwayat');
        container.innerHTML = "";
        if(data) {
            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                container.innerHTML += `
                    <div class="riwayat-item">
                        ✅ ${item.menu} (${item.porsi} porsi) - <b>${item.rasa}</b> | ${item.doneAt}
                    </div>
                `;
            });
        }
    });

    function openTab(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
